<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dr. Hemenway's 80th — Live Photo Album</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;cursor:none;}
#stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
#pic{max-width:100%;max-height:100%;object-fit:contain;transition:opacity .6s ease;opacity:0;}
#cap{position:fixed;left:0;right:0;bottom:0;padding:26px 36px 30px;text-align:center;
  background:linear-gradient(transparent,rgba(0,0,0,.82));pointer-events:none;}
#cap .ct{color:#fff;font-size:2.2rem;font-weight:700;text-shadow:0 2px 10px #000;line-height:1.2;}
#cap .nm{color:#ff5a5a;font-size:1.15rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;margin-top:8px;text-shadow:0 2px 8px #000;}
#brand{position:fixed;top:20px;left:28px;color:rgba(255,255,255,.55);font-weight:800;letter-spacing:.12em;text-transform:uppercase;font-size:.95rem;}
#count{position:fixed;top:20px;right:28px;color:rgba(255,255,255,.45);font-weight:700;font-size:.85rem;}
#empty{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;padding:30px;}
#empty .k{color:#ff5a5a;font-weight:800;letter-spacing:.2em;text-transform:uppercase;font-size:1rem;}
#empty h1{font-size:3rem;margin:10px 0 6px;}
#empty h1 .r{color:#d32f2f;}
#empty p{color:#9aa0b0;font-size:1.35rem;margin-top:12px;max-width:24ch;}
</style>
</head>
<body>
<div id="stage">
  <img id="pic" alt="" />
  <div id="empty">
    <div class="k">Live Photo Album</div>
    <h1>Dr. Hemenway's <span class="r">80th</span></h1>
    <p>Photos will appear here as guests add them. Scan the flyer and tap the camera!</p>
  </div>
</div>
<div id="brand">Dr. Hemenway's 80th</div>
<div id="count"></div>
<div id="cap"></div>

<script>
const LB_URL="https://hemenway-leaderboard.plywoodtom.workers.dev";
let photos=[], idx=0; const seen=new Set();
function esc(s){return(s+'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function imgUrl(id){return LB_URL.replace(/\/$/,'')+'/photo?id='+encodeURIComponent(id);}
async function poll(){
  try{
    const r=await fetch(LB_URL.replace(/\/$/,'')+'/photos');const list=await r.json();
    if(!Array.isArray(list))return;
    const hasNew=list.some(p=>!seen.has(p.id));
    if(list.length){
      list.forEach(p=>seen.add(p.id));
      photos=list.slice().reverse(); // newest first
      document.getElementById('empty').style.display='none';
      document.getElementById('count').textContent=photos.length+' photos';
      if(hasNew){idx=0;show();} // jump to newest when one arrives
    }
  }catch(e){}
}
function show(){
  if(!photos.length){document.getElementById('empty').style.display='flex';document.getElementById('pic').style.opacity=0;return;}
  const p=photos[idx%photos.length];const img=document.getElementById('pic');
  img.style.opacity=0;
  const tmp=new Image();
  tmp.onload=function(){img.src=tmp.src;img.style.opacity=1;
    const cap=document.getElementById('cap');
    cap.innerHTML=(p.caption?'<div class="ct">'+esc(p.caption)+'</div>':'')+(p.name?'<div class="nm">'+esc(p.name)+(p.caption?'':'')+'</div>':'');
  };
  tmp.src=imgUrl(p.id);
}
function next(){if(!photos.length)return;idx=(idx+1)%photos.length;show();}
setInterval(next,6000);
setInterval(poll,15000);
poll();
</script>
</body>
</html>
