<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Dr. Hemenway's 80th — Scan to Join</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#fff;color:#16181d;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;}
.card{max-width:620px;width:100%;text-align:center;border:4px solid #16181d;padding:40px 34px 34px;}
.kick{color:#d32f2f;font-weight:800;letter-spacing:.16em;text-transform:uppercase;font-size:1rem;margin-bottom:10px;}
h1{font-size:2rem;line-height:1.2;margin-bottom:6px;}
h1 .r{color:#d32f2f;}
.sub{color:#55585d;font-size:1.15rem;margin:14px 0 22px;font-weight:600;}
.qrbox{display:inline-block;background:#fff;padding:16px;border:3px solid #16181d;}
.qrbox img,.qrbox canvas{display:block;}
.scan{margin-top:18px;font-size:1.25rem;font-weight:800;color:#16181d;}
.scan .r{color:#d32f2f;}
.url{margin-top:8px;font-size:.95rem;color:#888c96;word-break:break-all;}
.foot{margin-top:18px;font-size:.8rem;color:#888c96;letter-spacing:.04em;text-transform:uppercase;font-weight:700;}
@media print{ body{padding:0;} .card{border-width:3px;} }
</style>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
<div class="card">
  <div class="kick">Dr. Merritt Hemenway's 80th &amp; Retirement</div>
  <h1>Want to take pictures for the photo album <span class="r">&mdash;</span> and even play a game while you visit?</h1>
  <div class="sub">Point your phone's camera at the code below.</div>
  <div class="qrbox" id="qr"></div>
  <div class="scan">Scan to <span class="r">join the fun</span></div>
  <div class="url">plywoodtom.github.io/drhemenway-preview/hunt.html</div>
  <div class="foot">Time Bandit Entertainment</div>
</div>
<script>
new QRCode(document.getElementById('qr'),{
  text:'https://plywoodtom.github.io/drhemenway-preview/hunt.html',
  width:360,height:360,correctLevel:QRCode.CorrectLevel.H
});
</script>
</body>
</html>
